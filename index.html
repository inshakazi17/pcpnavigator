<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PCP Navigator</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Theme Color -->
<meta name="theme-color" content="#0066ff">

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#0066ff;
    color:white;
    padding:20px;
}

button{
    padding:12px 25px;
    background:#0066ff;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

.container{
    margin-top:50px;
}
</style>

</head>

<body>

<header>
<h1>PCP Navigator</h1>
<p>Campus Navigation Made Easy</p>
</header>

<div class="container">

<h2>Welcome to PCP Navigator</h2>

<p>
Find buildings, classrooms and campus locations easily.
</p>

<button onclick="openMap()">Open Navigator</button>

</div>

<script>

function openMap(){
    window.location.href="https://campus-wayfinder-8.emergent.host/";
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
  .then(function() {
    console.log("Service Worker Registered");
  })
  .catch(function(error) {
    console.log("Service Worker registration failed:", error);
  });
}

</script>

</body>
</html>
